<div class="page-container">
  <asms-page-header
    title="Memberships"
    subtitle="{{ total() }} user–organization memberships"
    actionLabel="Add Membership"
    actionIcon="group_add" />

  <div class="toolbar">
    <asms-search-input placeholder="Search by user or organization..." (searchChange)="onSearch($event)" />
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="paged()">

      <ng-container matColumnDef="user">
        <th mat-header-cell *matHeaderCellDef>User</th>
        <td mat-cell *matCellDef="let row">
          <div class="user-cell">
            <div class="user-avatar">{{ row.displayName.charAt(0) }}</div>
            <div>
              <div class="user-name">{{ row.displayName }}</div>
              <div class="user-sub">&#64;{{ row.username }}</div>
            </div>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="organization">
        <th mat-header-cell *matHeaderCellDef>Organization</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.organizationName }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let row">
          <span class="role-badge" [style.color]="roleColor(row.role)" [style.background]="roleColor(row.role) + '18'">{{ row.role }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <asms-status-chip [status]="row.status" [statusMap]="statusMap" />
        </td>
      </ng-container>

      <ng-container matColumnDef="joinedAt">
        <th mat-header-cell *matHeaderCellDef>Joined</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.joinedAt | date:'dd MMM yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
          <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item><mat-icon>edit</mat-icon> Edit Role</button>
            <button mat-menu-item (click)="removeMembership(row)" class="danger-item"><mat-icon>person_remove</mat-icon> Remove</button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="total()" [pageSize]="pageSize()" [pageIndex]="pageIndex()" [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons (page)="onPage($event)" />
  </mat-card>
</div>
