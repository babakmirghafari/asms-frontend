<div class="page-container">
  <asms-page-header
    title="Permission Groups"
    subtitle="{{ total() }} named permission collections"
    actionLabel="New Group"
    actionIcon="create_new_folder" />

  <div class="toolbar">
    <asms-search-input placeholder="Search groups..." (searchChange)="onSearch($event)" />
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="paged()">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Group</th>
        <td mat-cell *matCellDef="let row">
          <div class="group-cell">
            <div class="group-icon"><mat-icon>folder_shared</mat-icon></div>
            <div>
              <div class="group-name">{{ row.name }}</div>
              <div class="group-desc">{{ row.description }}</div>
            </div>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="organization">
        <th mat-header-cell *matHeaderCellDef>Organization</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.organization }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <asms-status-chip [status]="row.status" [statusMap]="statusMap" />
        </td>
      </ng-container>

      <ng-container matColumnDef="memberCount">
        <th mat-header-cell *matHeaderCellDef>Members</th>
        <td mat-cell *matCellDef="let row">
          <span class="count-badge">{{ row.memberCount }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="permissionCount">
        <th mat-header-cell *matHeaderCellDef>Permissions</th>
        <td mat-cell *matCellDef="let row">
          <span class="count-badge perm">{{ row.permissionCount }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.createdAt | date:'dd MMM yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
          <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item><mat-icon>edit</mat-icon> Edit</button>
            <button mat-menu-item><mat-icon>people</mat-icon> Manage Members</button>
            <button mat-menu-item><mat-icon>key</mat-icon> Manage Permissions</button>
            <button mat-menu-item class="danger-item"><mat-icon>delete</mat-icon> Delete</button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="total()" [pageSize]="pageSize()" [pageIndex]="pageIndex()" [pageSizeOptions]="[10, 25]" showFirstLastButtons (page)="onPage($event)" />
  </mat-card>
</div>
