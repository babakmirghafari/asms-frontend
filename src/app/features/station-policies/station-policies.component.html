<div class="page-container">
  <asms-page-header
    title="Station Policies"
    subtitle="{{ total() }} geo-restricted and time-based access policies"
    actionLabel="New Policy"
    actionIcon="add_location" />

  <div class="toolbar">
    <asms-search-input placeholder="Search policies..." (searchChange)="onSearch($event)" />
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="paged()">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Policy</th>
        <td mat-cell *matCellDef="let row">
          <div class="policy-cell">
            <div class="policy-icon"><mat-icon>location_on</mat-icon></div>
            <span class="policy-name">{{ row.name }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="schedule">
        <th mat-header-cell *matHeaderCellDef>Schedule</th>
        <td mat-cell *matCellDef="let row">
          <div class="schedule">
            <span class="time">{{ row.workStartTime }} – {{ row.workEndTime }}</span>
            <span class="tz">{{ row.timezone }}</span>
          </div>
          <div class="days">
            @for (d of row.allowedDays; track d) {
              <span class="day-chip">{{ d }}</span>
            }
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef>Location</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.requiredLocation }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <asms-status-chip [status]="row.status" [statusMap]="statusMap" />
        </td>
      </ng-container>

      <ng-container matColumnDef="maxSessions">
        <th mat-header-cell *matHeaderCellDef>Max Sessions</th>
        <td mat-cell *matCellDef="let row" class="muted center">{{ row.maxConcurrentSessions }}</td>
      </ng-container>

      <ng-container matColumnDef="organization">
        <th mat-header-cell *matHeaderCellDef>Organization</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.organization }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
          <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item><mat-icon>edit</mat-icon> Edit</button>
            <button mat-menu-item class="danger-item"><mat-icon>delete</mat-icon> Delete</button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="total()" [pageSize]="pageSize()" [pageIndex]="pageIndex()" [pageSizeOptions]="[10, 25]" showFirstLastButtons (page)="onPage($event)" />
  </mat-card>
</div>
