<div class="page-container">
  <asms-page-header
    title="Permissions"
    subtitle="{{ total() }} permissions in catalog"
    actionLabel="New Permission"
    actionIcon="add" />

  <div class="toolbar">
    <asms-search-input placeholder="Search by name or resource..." (searchChange)="onSearch($event)" />
    <mat-form-field appearance="outline" class="filter">
      <mat-label>Resource</mat-label>
      <mat-select [value]="resourceFilter()" (selectionChange)="onResourceFilter($event.value)">
        <mat-option value="">All Resources</mat-option>
        @for (r of resources(); track r) {
          <mat-option [value]="r">{{ r }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="paged()">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Permission Name</th>
        <td mat-cell *matCellDef="let row" class="perm-name">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="resource">
        <th mat-header-cell *matHeaderCellDef>Resource</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.resource }}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let row">
          <span class="action-badge" [style.color]="actionColor(row.action)" [style.background]="actionColor(row.action) + '18'">
            {{ row.action }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="scope">
        <th mat-header-cell *matHeaderCellDef>Scope</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.scope }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <asms-status-chip [status]="row.status" [statusMap]="statusMap" />
        </td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.createdAt | date:'dd MMM yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
          <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item class="danger-item"><mat-icon>delete</mat-icon> Delete</button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="total()" [pageSize]="pageSize()" [pageIndex]="pageIndex()" [pageSizeOptions]="[10, 25]" showFirstLastButtons (page)="onPage($event)" />
  </mat-card>
</div>
