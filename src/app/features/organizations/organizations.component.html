<div class="page-container">
  <asms-page-header
    title="Organizations"
    subtitle="{{ total() }} organizations registered"
    actionLabel="New Organization"
    actionIcon="add_business" />

  <div class="toolbar">
    <asms-search-input placeholder="Search by name or domain..." (searchChange)="onSearch($event)" />
    <mat-form-field appearance="outline" class="filter">
      <mat-label>Status</mat-label>
      <mat-select [value]="statusFilter()" (selectionChange)="onStatusFilter($event.value)">
        <mat-option value="">All</mat-option>
        @for (s of statusOptions; track s) {
          <mat-option [value]="s">{{ statusLabel(s) }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="paged()" class="orgs-table">

      <ng-container matColumnDef="avatar">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <div class="org-avatar" [style.background]="avatarColor(row.id)">
            {{ row.name.charAt(0) }}
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Organization</th>
        <td mat-cell *matCellDef="let row">
          <span class="org-name">{{ row.name }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="domain">
        <th mat-header-cell *matHeaderCellDef>Domain</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.domain }}</td>
      </ng-container>

      <ng-container matColumnDef="plan">
        <th mat-header-cell *matHeaderCellDef>Plan</th>
        <td mat-cell *matCellDef="let row">
          <span class="plan-badge" [style.color]="planColor(row.plan)" [style.background]="planColor(row.plan) + '18'">
            {{ row.plan }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let row">
          <asms-status-chip [status]="row.status" [statusMap]="statusMap" />
        </td>
      </ng-container>

      <ng-container matColumnDef="memberCount">
        <th mat-header-cell *matHeaderCellDef>Members</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.memberCount }}</td>
      </ng-container>

      <ng-container matColumnDef="appCount">
        <th mat-header-cell *matHeaderCellDef>Apps</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.appCount }}</td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef>Created</th>
        <td mat-cell *matCellDef="let row" class="muted">{{ row.createdAt | date:'dd MMM yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row" class="actions-cell">
          <button mat-icon-button [matMenuTriggerFor]="menu" (click)="$event.stopPropagation()">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item><mat-icon>edit</mat-icon> Edit</button>
            <button mat-menu-item><mat-icon>people</mat-icon> View Members</button>
            <button mat-menu-item class="danger-item"><mat-icon>delete</mat-icon> Delete</button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      [length]="total()"
      [pageSize]="pageSize()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[10, 25, 50]"
      showFirstLastButtons
      (page)="onPage($event)" />
  </mat-card>
</div>
