@if (loading) {
  <div>Loading...</div>
}
@if (!loading) {
  <table>
    <thead>
      <tr>
        @for (col of columns; track col.key) {
          <th>{{ col.label }}</th>
        }
      </tr>
    </thead>
    <tbody>
      @for (row of data; track row.id) {
        <tr>
          @for (col of columns; track col.key) {
            <td>{{ row[col.key] }}</td>
          }
        </tr>
      }
    </tbody>
  </table>
}
