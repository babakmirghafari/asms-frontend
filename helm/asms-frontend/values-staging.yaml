replicaCount: 1

image:
  tag: "latest"

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: staging.asms.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: asms-frontend-staging-tls
      hosts:
        - staging.asms.example.com

env:
  API_BASE_URL: "http://asms-backend-staging:8080"

resources:
  requests:
    memory: "32Mi"
    cpu: "25m"
  limits:
    memory: "64Mi"
    cpu: "50m"
